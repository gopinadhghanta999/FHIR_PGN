resources:
  jobs:
    FHIR_Data_processing:
      name: FHIR_Data_processing
      email_notifications:
        on_failure:
          - ghantagopinadh999@gmail.com
      tasks:
        - task_key: Medallain_architecture_creation
          notebook_task:
            notebook_path: Architecture_configuration
            source: GIT
        - task_key: Raw_Data_Ingestion
          depends_on:
            - task_key: Medallain_architecture_creation
          notebook_task:
            notebook_path: 01_Raw_ingesting
            source: GIT
        - task_key: Bronze_ingesiton
          depends_on:
            - task_key: Raw_Data_Ingestion
          notebook_task:
            notebook_path: 02_Bronze_layer
            source: GIT
        - task_key: Silver_Patient
          depends_on:
            - task_key: Bronze_ingesiton
          notebook_task:
            notebook_path: silver_patient_processing
            source: GIT
        - task_key: silver_condition
          depends_on:
            - task_key: Bronze_ingesiton
          notebook_task:
            notebook_path: silver_processing_condition
            source: GIT
        - task_key: silver_encounter
          depends_on:
            - task_key: Bronze_ingesiton
          notebook_task:
            notebook_path: silver_processing_condition
            source: GIT
        - task_key: silver_observation
          depends_on:
            - task_key: Bronze_ingesiton
          notebook_task:
            notebook_path: silver_processing_observation
            source: GIT
        - task_key: Loading_To_Gold
          depends_on:
            - task_key: Silver_Patient
            - task_key: silver_condition
            - task_key: silver_encounter
            - task_key: silver_observation
          notebook_task:
            notebook_path: FHIR_Gold_Layer_StarSchema
            source: GIT
      git_source:
        git_url: https://github.com/gopinadhghanta999/FHIR_PGN.git
        git_provider: gitHub
        git_branch: main
      queue:
        enabled: true
      performance_target: PERFORMANCE_OPTIMIZED
